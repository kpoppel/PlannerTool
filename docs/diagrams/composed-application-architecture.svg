<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="760" viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title description">
  <title id="title">Composed browser application architecture</title>
  <desc id="description">The browser bootstrap creates the planner application composition root. Commands mutate AppStore, selectors derive reads, runtime services orchestrate collaborators, and plugins consume PlannerApi.</desc>
  <style>
    .title { font: 700 22px sans-serif; fill: #102030; }
    .subtitle { font: 13px sans-serif; fill: #425466; }
    .heading { font: 700 15px sans-serif; fill: #102030; }
    .label { font: 13px sans-serif; fill: #243746; }
    .small { font: 11px sans-serif; fill: #425466; }
    .node { stroke: #405466; stroke-width: 1.5; rx: 10; }
    .bootstrap { fill: #e8f2ff; }
    .application { fill: #e9f8f1; stroke: #177b58; }
    .api { fill: #fff6d9; stroke: #b77b00; }
    .store { fill: #fceee8; stroke: #b64c35; }
    .command { fill: #eef4ff; stroke: #3f69b2; }
    .selector { fill: #f5efe6; stroke: #8a5b1e; }
    .service { fill: #f2efff; stroke: #705bc8; }
    .external { fill: #f7f9fb; }
    .arrow { stroke: #405466; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .event { stroke: #705bc8; stroke-width: 1.5; stroke-dasharray: 6 5; fill: none; marker-end: url(#event-arrow); }
    .boundary { fill: none; stroke: #9aacba; stroke-width: 1.25; stroke-dasharray: 7 5; rx: 14; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#405466"/>
    </marker>
    <marker id="event-arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#705bc8"/>
    </marker>
  </defs>

  <text x="48" y="42" class="title">PlannerTool composed browser architecture</text>
  <text x="48" y="66" class="subtitle">AppStore is the canonical runtime truth; commands own writes, selectors own pure reads, and runtime services orchestrate browser collaborators.</text>

  <rect x="40" y="100" width="1120" height="520" class="boundary"/>
  <text x="58" y="124" class="small">Browser application boundary</text>

  <rect x="75" y="155" width="210" height="90" class="node bootstrap"/>
  <text x="95" y="186" class="heading">Browser bootstrap</text>
  <text x="95" y="209" class="label">app.js</text>
  <text x="95" y="229" class="small">Starts lifecycle and plugins</text>

  <rect x="350" y="135" width="500" height="150" class="node application"/>
  <text x="410" y="167" class="heading">plannerApplication.js</text>
  <text x="410" y="190" class="label">Explicit composition root</text>
  <text x="410" y="212" class="small">createPlannerApplication · createPlannerCommands · createPlannerSelectors</text>
  <text x="410" y="235" class="small">AppStore wiring · adapters · lifecycle · runtime service composition</text>

  <rect x="915" y="155" width="205" height="90" class="node api"/>
  <text x="936" y="186" class="heading">PlannerApi v1</text>
  <text x="936" y="209" class="label">Versioned public API</text>
  <text x="936" y="229" class="small">Queries and commands</text>

  <rect x="60" y="355" width="250" height="110" class="node external"/>
  <text x="96" y="392" class="heading">Lit UI components</text>
  <text x="96" y="415" class="label">Timeline · sidebar · menus · modals</text>
  <text x="96" y="438" class="small">Use PlannerApi and command/query runtime surfaces</text>

  <rect x="355" y="355" width="235" height="110" class="node command"/>
  <text x="377" y="387" class="heading">Commands</text>
  <text x="377" y="410" class="label">createPlannerCommands.js</text>
  <text x="377" y="433" class="small">Command-first writes · reconciliation · event sequencing</text>

  <rect x="625" y="355" width="220" height="110" class="node store"/>
  <text x="647" y="387" class="heading">AppStore</text>
  <text x="647" y="410" class="label">Canonical runtime truth</text>
  <text x="647" y="433" class="small">Immutable snapshots · labeled transactions</text>

  <rect x="880" y="355" width="250" height="110" class="node selector"/>
  <text x="901" y="387" class="heading">Selectors</text>
  <text x="901" y="410" class="label">Expansion · scenario · capacity · task type</text>
  <text x="901" y="433" class="small">Pure derived reads over AppStore snapshots</text>

  <rect x="460" y="500" width="270" height="110" class="node external"/>
  <text x="481" y="532" class="heading">First-party plugins</text>
  <text x="481" y="555" class="label">Graph · cost · export · events · boards</text>
  <text x="481" y="578" class="small">Injected PlannerApi; no direct service imports</text>

  <rect x="800" y="500" width="320" height="110" class="node service"/>
  <text x="821" y="532" class="heading">Runtime service container</text>
  <text x="821" y="555" class="label">createPlannerRuntimeServices.js</text>
  <text x="821" y="578" class="small">Scenario · view · filter · group · plugin · capacity orchestration</text>

  <rect x="90" y="650" width="330" height="90" class="node service"/>
  <text x="111" y="682" class="heading">Focused application services</text>
  <text x="111" y="705" class="label">Feature · scenario · view · groups · capacity</text>
  <text x="111" y="725" class="small">FeatureService · ScenarioManager · ViewManagementService</text>

  <rect x="475" y="650" width="220" height="90" class="node service"/>
  <text x="501" y="682" class="heading">EventBus</text>
  <text x="501" y="705" class="label">Typed domain events</text>
  <text x="501" y="725" class="small">EventRegistry symbols</text>

  <rect x="760" y="650" width="360" height="90" class="node external"/>
  <text x="781" y="682" class="heading">Data access</text>
  <text x="781" y="705" class="label">dataService · ProviderREST · preferences · plugin config</text>
  <text x="781" y="725" class="small">Backend APIs, saved views, scenarios, runtime plugin settings</text>

  <path d="M285 200 L350 200" class="arrow"/>
  <text x="307" y="188" class="small">initialize</text>
  <path d="M850 200 L915 200" class="arrow"/>
  <text x="867" y="188" class="small">exports</text>

  <path d="M205 355 L420 285" class="arrow"/>
  <text x="268" y="315" class="small">UI bootstrap and composition access</text>
  <path d="M310 410 L355 410" class="arrow"/>
  <text x="316" y="396" class="small">writes</text>
  <path d="M590 410 L625 410" class="arrow"/>
  <text x="594" y="396" class="small">update</text>
  <path d="M735 355 L735 305" class="arrow"/>
  <text x="744" y="332" class="small">owned by root</text>
  <path d="M845 410 L880 410" class="arrow"/>
  <text x="849" y="396" class="small">read</text>
  <path d="M990 355 L1020 245" class="arrow"/>
  <text x="1014" y="302" class="small">query surface</text>
  <path d="M850 215 L960 500" class="arrow"/>
  <text x="878" y="365" class="small">runtime wiring</text>
  <path d="M580 500 L985 245" class="arrow"/>
  <text x="725" y="357" class="small">injected API</text>

  <path d="M520 465 L520 500" class="event"/>
  <path d="M960 610 L585 650" class="arrow"/>
  <text x="754" y="621" class="small">domain events</text>
  <path d="M800 555 L420 690" class="arrow"/>
  <text x="596" y="613" class="small">delegates to collaborators</text>
  <path d="M420 695 L760 695" class="arrow"/>
  <text x="553" y="683" class="small">requests and persistence</text>
  <path d="M695 695 L760 695" class="event"/>
  <text x="704" y="683" class="small">event-backed flows</text>
  <path d="M1010 465 L1010 500" class="arrow"/>
  <text x="1019" y="486" class="small">derived reads drive UI</text>
</svg>
