# Mandatory: Schema version of the configuration file
schema_version: 2
# Azure Organisation name
azure_devops_organization: <Azure azure_devops_organisation>
log_level: <level: DEBUG, INFO, WARNING, ERRRR, CRITICAL>
# Feature flags to enable/disable specific features
feature_flags:
  # Optional: Use pre-recorded mock data instead of live Azure DevOps (default: false).
  # Useful for offline development when ADC / Azure DevOps is unavailable.
  # Record fixture data first with:
  #   AZURE_DEVOPS_PAT=<pat> python scripts/record_azure_mock.py
  use_azure_mock: false
  # Optional: Custom path for the mock fixture directory (default: data/azure_mock).
  # Only used when use_azure_mock is true.
  azure_mock_data_dir: data/azure_mock
  # Optional: Enable Azure Cache (default: false)
  enable_azure_cache: true
  # Optional: Enable in-memory cache layer (default: false, requires enable_azure_cache: true)
  # When enabled, provides <1ms cache response times for hot data
  enable_memory_cache: true
  # Optional: Enable Brotli middleware for compression (default: false)
  enable_brotli_middleware: true

# Optional: Memory cache configuration (only used when enable_memory_cache: true)
memory_cache:
  # Maximum memory cache size in MB (default: 50)
  max_size_mb: 50
  # Cache staleness threshold in seconds (default: 1800 = 30 minutes)
  # Data older than this is considered stale and will be refreshed on next access
  staleness_seconds: 1800
# Optional: Relative or absolute path to the database directory or full path and filename
database_path: </path/to/database/directory/or/file.yaml>
