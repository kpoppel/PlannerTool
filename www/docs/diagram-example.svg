<svg xmlns="http://www.w3.org/2000/svg" width="600" height="200" viewBox="0 0 600 200">
  <rect width="100%" height="100%" fill="#fff"/>
  <g font-family="Arial, Helvetica, sans-serif" font-size="14">
    <rect x="20" y="20" width="160" height="60" fill="#e8f4ff" stroke="#bfe0ff" rx="6"/>
    <text x="100" y="52" text-anchor="middle" fill="#073642">PlannerTool</text>
    <rect x="220" y="20" width="160" height="60" fill="#f0fff0" stroke="#cfeecf" rx="6"/>
    <text x="300" y="52" text-anchor="middle" fill="#073642">Projects</text>
    <rect x="420" y="20" width="160" height="60" fill="#fff4e8" stroke="#ffddb8" rx="6"/>
