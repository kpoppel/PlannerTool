    <path d="M180 50 L220 50" stroke="#888" stroke-width="2" fill="none" marker-end="url(#arrow)" />
    <path d="M380 50 L420 50" stroke="#888" stroke-width="2" fill="none" marker-end="url(#arrow)" />
